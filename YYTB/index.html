<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Яся, я тебя люблю!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f172a, #1e293b, #030712);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        #action-btn {
            background-color: #22d3ee;
            color: #000000;
            border: none;
            padding: 18px 36px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(34, 211, 238, 0.4);
            transition: transform 0.2s, background-color 0.2s;
        }

        #action-btn:active {
            transform: scale(0.95);
        }

        #content {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.2);
            animation: fadeIn 1s ease-in;
        }

        img {
            max-width: 85vw;
            max-height: 60vh;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1.2s ease-in;
            object-fit: cover;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <button id="action-btn" onclick="showLove()">Нажми сюда</button>

    <div id="content">
        <h1>Яся, я тебя люблю ❤️</h1>
        <img src="{{ url_for('static', filename='pict.jpg') }}" alt="Яся">
    </div>

    <script>
        function showLove() {
            document.getElementById('action-btn').style.display = 'none';
            document.getElementById('content').style.display = 'flex';
        }
    </script>
</body>
</html>
